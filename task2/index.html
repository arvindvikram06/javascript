<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Doto:wght,ROND@900,75&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="cal-container">

        <div class="cal-output">
            <p id="user-output">0</p>
        </div>
        <div class="calc-buttons">
            <button class="non-op btn">Del</button>
            <button class="non-op btn">AC</button>
            <button class="operator btn">%</button>
            <button class="operator btn">/</button>
            <button class="num btn">7</button>
            <button class="num btn">8</button>
            <button class="num btn">9</button>
            <button class="operator btn">*</button>
            <button class="num btn">4</button>
            <button class="num btn">5</button>
            <button class="num btn">6</button>
            <button class="operator btn">-</button>
            <button class="num btn">1</button>
            <button class="num btn">2</button>
            <button class="num btn">3</button>
            <button class="operator btn">+</button>
            <button style="visibility: hidden;">n</button>
            <button class="num btn">0</button>
            <button class="operator btn">.</button>
            <button class="equals btn">=</button>
        </div>
        </div>
    </main>
    
</body>

  <script src="./script.js"></script>
</html>
