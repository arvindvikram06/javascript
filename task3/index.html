<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>
        <h1>Thumbnail Viewer</h1>
    </header>

    <main>
        <div id="popup">
            <span id="closeBtn">&times;</span>
            <img id="popupImg" src="" />
        </div>
        <div class="thumbnail-container">
            <div class="thumnail-pic"><img class="pic" src="./assets/car1.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/car2.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/car3.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/car4.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/car5.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/car6.png"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/weight.jpg"></div>
            <div class="thumnail-pic"><img class="pic" src="./assets/bmw7.png"></div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
